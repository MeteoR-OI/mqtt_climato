# =============================================================
# Mosquitto ACL Configuration
# =============================================================
# %u = client username
#
# Stations: can only PUBLISH to their own topic
# Backend:  can only SUBSCRIBE to all climato topics

# --- Backend user: read access to all climato topics ---
user backend
topic read climato/#

# --- Station users: write access to their own topic ---
# Each station authenticates with its station_id as username
# (e.g., station01 can only publish to climato/station01/data)
pattern write climato/%u/data
