# =============================================================
# Mosquitto ACL Configuration
# =============================================================
# %u = client username
#
# Stations: can only PUBLISH to their own topic
# Backend:  can only SUBSCRIBE to all climato topics

# --- Backend user: read access to all climato topics ---
user backend
topic read climato/#

# --- Metrics collector: read $SYS broker stats + climato data for per-station counters ---
user metrics
topic read $SYS/#
topic read climato/#

# --- Station users: write access to any climato station topic ---
# TODO: switch to per-station ACL (pattern write climato/%u/data)
# when each station has its own MQTT user
user station
topic write climato/#
