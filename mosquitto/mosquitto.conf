# =============================================================
# Mosquitto MQTT Broker - Clever Cloud Configuration
# =============================================================

# --- Network ---
# Port 4040: Clever Cloud TCP redirection (external port assigned dynamically)
listener 4040
protocol mqtt

# --- Authentication ---
allow_anonymous false
password_file /mosquitto/config/passwd

# --- Authorization ---
acl_file /mosquitto/config/acl.conf

# --- Persistence ---
# Persists within deployment lifecycle (not across redeployments)
persistence true
persistence_location /mosquitto/data/
autosave_interval 300

# --- Logging ---
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
connection_messages true
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S

# --- Performance ---
max_connections 100
max_queued_messages 5000
max_inflight_messages 20
message_size_limit 1048576
